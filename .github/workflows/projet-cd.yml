# Projet DevOps — déploiement Render (API) + auto-deploy Render via lien GitHub
# Secrets requis : RENDER_SERVICE_ID, RENDER_API_KEY
# Image Docker Hub : déjà poussée (romainmlt/devops-cv-webapp) — job Hub optionnel via workflow_dispatch

name: Projet — CD Render

on:
  push:
    branches: [main]
    paths:
      - 'rendus/projet/**'
      - '.github/workflows/projet-cd.yml'

jobs:
  deploy-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
