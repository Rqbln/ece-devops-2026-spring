# Projet DevOps — CD Docker Hub + Render (optionnel)
# Secrets GitHub : DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, RENDER_SERVICE_ID, RENDER_API_KEY
# Sans secrets Docker Hub : le job build échoue au login — configurer avant push sur main.

name: Projet — CD Docker & Render

on:
  push:
    branches: [main]
    paths:
      - 'rendus/projet/**'
      - '.github/workflows/projet-cd.yml'

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: rendus/projet/webapp
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-cv-webapp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-cv-webapp:${{ github.sha }}

  deploy-render:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        if: ${{ secrets.RENDER_SERVICE_ID != '' && secrets.RENDER_API_KEY != '' }}
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

      - name: Skip Render (secrets non configurés)
        if: ${{ secrets.RENDER_SERVICE_ID == '' || secrets.RENDER_API_KEY == '' }}
        run: echo "RENDER_* non configurés — déploiement Render ignoré (homepage locale / Docker suffisent)."
