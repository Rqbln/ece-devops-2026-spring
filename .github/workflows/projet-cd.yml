# Projet DevOps — CD Docker Hub + déploiement Render
# Secrets : DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (optionnel), RENDER_SERVICE_ID, RENDER_API_KEY
# Render est aussi relié au repo GitHub (auto-deploy au push sur main).

name: Projet — CD Docker & Render

on:
  push:
    branches: [main]
    paths:
      - 'rendus/projet/**'
      - '.github/workflows/projet-cd.yml'

jobs:
  deploy-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

  docker:
    runs-on: ubuntu-latest
    if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: rendus/projet/webapp
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-cv-webapp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-cv-webapp:${{ github.sha }}
