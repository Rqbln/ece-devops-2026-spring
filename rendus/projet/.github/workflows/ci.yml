name: CI - CV Webapp

on:
  push:
    branches: [main]
    paths:
      - 'rendus/projet/**'
  pull_request:
    branches: [main]
    paths:
      - 'rendus/projet/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rendus/projet/webapp

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: rendus/projet/webapp/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint
        run: npx eslint src test

      - name: Run tests
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: npm test
