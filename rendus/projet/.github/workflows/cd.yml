name: CD - Build Docker & Deploy Render

on:
  push:
    branches: [main]
    paths:
      - 'rendus/projet/**'

jobs:
  docker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rendus/projet/webapp

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: rendus/projet/webapp
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-cv-webapp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-cv-webapp:${{ github.sha }}

  deploy-render:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

  # Sans secrets Render, le job docker suffit pour la démo CI/CD
