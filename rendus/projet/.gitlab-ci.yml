# Bonus — pipeline GitLab CI/CD (miroir du workflow GitHub)

stages:
  - test
  - build

variables:
  REDIS_HOST: redis
  REDIS_PORT: "6379"

test:
  stage: test
  image: node:18
  services:
    - name: redis:7-alpine
      alias: redis
  before_script:
    - cd rendus/projet/webapp && npm ci || npm install
  script:
    - cd rendus/projet/webapp && npx eslint src test
    - cd rendus/projet/webapp && npm test

docker-build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  only:
    - main
  script:
    - cd rendus/projet/webapp && docker build -t $CI_REGISTRY_IMAGE/devops-cv-webapp:$CI_COMMIT_SHA .
