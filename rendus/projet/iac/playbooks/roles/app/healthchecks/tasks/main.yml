---
- name: Wait for application port
  wait_for:
    port: 3000
    delay: 3
    timeout: 60

- name: Check application health endpoint
  uri:
    url: http://127.0.0.1:3000/health
    return_content: yes
  register: app_health

- name: Print health response
  debug:
    msg: "{{ app_health.content }}"

- name: Assert health endpoint is OK
  assert:
    that:
      - app_health.status == 200
      - app_health.json.status == 'ok'
